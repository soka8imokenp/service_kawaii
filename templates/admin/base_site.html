{{ block.super }}

{% block extrahead %}
{{ block.super }}
<!-- Table dynamic Lucide icon injector for model table links -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
      // Only run on desktop
      if (window.innerWidth <= 768) {
          return;
      }
      
      const iconMapping = {
          'ariza': 'message-square',
          'application': 'message-square',
          'profil': 'user',
          'profile': 'user',
          'user': 'users',
          'foydalanuvchi': 'users',
          'group': 'shield-alert',
          'guruh': 'shield-alert',
          'xabar': 'mail',
          'message': 'mail'
      };

      // Scan table links in lists and dashboard tables and inject custom icons
      const links = document.querySelectorAll('#changelist table tbody th a, .saas-db-card-table td a');
      links.forEach(link => {
          const text = link.textContent.toLowerCase();
          let iconName = 'database'; // default
          for (const [key, icon] of Object.entries(iconMapping)) {
              if (text.includes(key)) {
                  iconName = icon;
                  break;
              }
          }
          
          if (!link.querySelector('.lucide')) {
              const iconEl = document.createElement('i');
              iconEl.setAttribute('data-lucide', iconName);
              iconEl.classList.add('sidebar-icon-inline');
              iconEl.style.width = '14px';
              iconEl.style.height = '14px';
              iconEl.style.marginRight = '8px';
              iconEl.style.verticalAlign = 'middle';
              iconEl.style.display = 'inline-block';
              iconEl.style.opacity = '0.7';
              link.insertBefore(iconEl, link.firstChild);
          }
      });

      if (window.lucide) {
          window.lucide.createIcons();
      }
  });
</script>
{% endblock %}
