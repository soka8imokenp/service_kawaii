version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: sumire_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sumire_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sumire_backend
    restart: always
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-sumire_db}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-prod-key-sumire-08082002}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      BOT_TOKEN: ${BOT_TOKEN}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      ADMIN_BOT_TOKEN: ${ADMIN_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sumire_bot
    restart: always
    command: python bot.py
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      WEBAPP_URL: ${WEBAPP_URL}
      ADMIN_BOT_TOKEN: ${ADMIN_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-sumire_db}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: sumire_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  static_volume:
  media_volume:
